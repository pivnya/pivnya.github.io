<section class="glass-border">
    <h3 class="section-title">Selected Posts</h3>
    <ul>
    {{ $fav := slice }}
    {{ $fav = where site.RegularPages ".Params.favourite" true }}

    {{ range $fav }}
        <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
    {{ else }}
        <li class="muted">No selected posts yet...</li>
    {{ end }}
    </ul>
</section>
